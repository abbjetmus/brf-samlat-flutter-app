name: brf_samlat_flutter_app
description: "BRF Samlat - Bostadsrättsföreningens digitala plattform"
publish_to: 'none'

version: 1.0.31+31

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_compositions: ^0.1.1

  # Backend
  pocketbase: ^0.23.2

  # Push notifications
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0

  # Navigation
  go_router: ^17.0.1

  # Calendar
  syncfusion_flutter_calendar: ^28.1.33
  syncfusion_localizations: ^28.1.33

  # Storage
  shared_preferences: ^2.5.4

  # Media & Files
  image_picker: ^1.1.2
  file_picker: ^8.0.0+1

  # Rich text / HTML rendering
  flutter_html: ^3.0.0-beta.2

  # Utilities
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  url_launcher: ^6.2.6
  http: ^1.2.2

  # Force-update gate (checks store for newer versions)
  upgrader: ^12.3.0
  flutter_chat_ui: ^2.0.0
  flutter_chat_core: ^2.0.0
  uuid: ^4.5.1
  flutter_quill: ^11.5.0
  flutter_quill_delta_from_html: ^1.5.3
  vsc_quill_delta_to_html: ^1.0.5
  # Regular dependency (not dev_dependency): its Android plugin must be present in
  # release builds, otherwise GeneratedPluginRegistrant references a missing class.
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_compositions_lints: ^0.1.1
  custom_lint: ^0.8.1
  build_runner: ^2.10.4
  freezed: ^3.2.4
  json_serializable: ^6.11.3
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  analyzer: ^8.0.0

flutter:
  uses-material-design: true

# App icons — generated from the BRF Samlat logo (green house mark on white).
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

# Splash screen — BRF Samlat logo centered on a white (light) / dark canvas.
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#ffffff"
  image: assets/splash/splash_logo.png
  color_dark: "#0B1220"
  image_dark: assets/splash/splash_logo.png
  android_12:
    image: assets/splash/splash_logo.png
    color: "#ffffff"
    image_dark: assets/splash/splash_logo.png
    color_dark: "#0B1220"
  android: true
  ios: true
