name: brf_samlat_flutter_app
description: "BRF Samlat - Bostadsrättsföreningens digitala plattform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_compositions: ^0.1.1

  # Backend
  pocketbase: ^0.23.2

  # Push notifications
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0

  # Navigation
  go_router: ^17.0.1

  # Calendar
  syncfusion_flutter_calendar: ^28.1.33

  # Storage
  shared_preferences: ^2.5.4

  # Media & Files
  image_picker: ^1.1.2
  file_picker: ^8.0.0+1

  # Rich text / HTML rendering
  flutter_html: ^3.0.0-beta.2

  # Utilities
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  url_launcher: ^6.2.6
  http: ^1.2.2

  # Force-update gate (checks store for newer versions)
  upgrader: ^12.3.0
  flutter_chat_ui: ^2.0.0
  flutter_chat_core: ^2.0.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_compositions_lints: ^0.1.1
  custom_lint: ^0.8.1
  build_runner: ^2.10.4
  freezed: ^3.2.4
  json_serializable: ^6.11.3
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  analyzer: ^8.0.0

flutter:
  uses-material-design: true
